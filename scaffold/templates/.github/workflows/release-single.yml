# =============================================================================
# {{PROJECT_NAME}} — Release (Single Server)
# =============================================================================
# Blue-green deployment to a single server per environment.
# Triggered manually via workflow_dispatch with environment selection.
#
# Flow: build+test → create package → upload → deploy-config → blue-green deploy
#
# All deployment logic is handled by deploy-cli.js — YAML is orchestration only.
# Architecture: CI Runner → SSH → Remote Server → remote-ops.sh
# =============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - test
          - acceptance
          - production
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

# One deploy per environment at a time — never run concurrent deploys
concurrency:
  group: release-${{ inputs.deploy_target }}
  cancel-in-progress: false

jobs:
  # ── Build & Test ─────────────────────────────────────────────
  build_and_test:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Build
        run: yarn clean && yarn build

      - name: Test
        if: ${{ !inputs.skip_tests }}
        run: yarn test

  # ── Deploy ───────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ inputs.deploy_target }}
    runs-on: self-hosted
    timeout-minutes: 20
    needs: [build_and_test]
    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies + build
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile
          yarn clean && yarn build

      # Create the deployment tarball (deployment-X.Y.Z.tgz)
      - name: Create deployment package
        run: ./deploy-package.sh

      # Upload tarball + scripts + Docker/Nginx configs to the server
      - name: Upload to server
        run: |
          node deployment/scripts/deploy-cli.js upload \
            --env ${{ inputs.deploy_target }} \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.deploy_target }} \
            --project-name {{PROJECT_NAME_LOWER}}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}

      # Deploy config files from GitHub secrets to the server
      - name: Deploy config files
        run: |
          node deployment/scripts/deploy-cli.js deploy-config \
            --env ${{ inputs.deploy_target }} \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.deploy_target }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}
          ALL_SECRETS: ${{ toJSON(secrets) }}

      # Full blue-green deploy: prepare (build + health) → switch (nginx swap)
      - name: Blue-green deploy
        run: |
          node deployment/scripts/deploy-cli.js deploy \
            --env ${{ inputs.deploy_target }} \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.deploy_target }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}
