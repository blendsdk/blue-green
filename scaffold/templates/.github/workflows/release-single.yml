name: Release

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target'
        required: true
        type: choice
        options:
          - test
          - acceptance
          - production
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

concurrency:
  group: release-${{ inputs.deploy_target }}
  cancel-in-progress: false

jobs:
  build_and_test:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Build
        run: yarn clean && yarn build

      - name: Test
        if: ${{ !inputs.skip_tests }}
        run: yarn test

  deploy:
    name: Deploy to ${{ inputs.deploy_target }}
    runs-on: self-hosted
    timeout-minutes: 20
    needs: [build_and_test]
    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Build
        run: yarn clean && yarn build

      - name: Resolve deploy target
        id: target
        run: |
          case "${{ inputs.deploy_target }}" in
            test)
              echo "server=${{ secrets.TEST_SERVER }}" >> $GITHUB_OUTPUT
              echo "prefix=TEST" >> $GITHUB_OUTPUT
              ;;
            acceptance)
              echo "server=${{ secrets.ACC_SERVER }}" >> $GITHUB_OUTPUT
              echo "prefix=ACC" >> $GITHUB_OUTPUT
              ;;
            production)
              echo "server=${{ secrets.PROD_SERVER }}" >> $GITHUB_OUTPUT
              echo "prefix=PROD" >> $GITHUB_OUTPUT
              ;;
          esac
          echo "🎯 Deploying to: ${{ inputs.deploy_target }}"

      - name: Setup SSH
        id: ssh
        env:
          SSH_KEY_VALUE: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          SSH_CONFIG="/tmp/ssh-deploy-config"
          IDENTITY_LINE=""

          # Write SSH key from secret if provided (optional — skip if runner has pre-configured SSH)
          if [ -n "$SSH_KEY_VALUE" ]; then
            SSH_KEY="/tmp/ssh-deploy-key"
            printf '%s\n' "$SSH_KEY_VALUE" > $SSH_KEY
            chmod 600 $SSH_KEY
            IDENTITY_LINE="  IdentityFile $SSH_KEY"
          fi

          cat > $SSH_CONFIG << EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
            LogLevel ERROR
          ${IDENTITY_LINE}
          EOF

          JUMP_HOST="${{ secrets.JUMP_HOST }}"
          if [ -n "$JUMP_HOST" ]; then
            echo "  ProxyCommand ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR -W %h:%p ${JUMP_HOST}" >> $SSH_CONFIG
          fi

          chmod 600 $SSH_CONFIG
          echo "ssh_config=$SSH_CONFIG" >> $GITHUB_OUTPUT

      - name: Pre-deploy health check
        run: |
          SERVER="${{ steps.target.outputs.server }}"
          SSH_CONFIG="${{ steps.ssh.outputs.ssh_config }}"

          echo "Checking server reachability..."
          if ssh -F $SSH_CONFIG ${SERVER} "echo 'Server reachable'" 2>/dev/null; then
            echo "✅ Server is reachable"
          else
            echo "❌ Cannot reach server: ${SERVER}"
            exit 1
          fi

      - name: Upload remote-ops and scripts
        run: |
          SSH_CONFIG="${{ steps.ssh.outputs.ssh_config }}"
          REMOTE_HOST="${{ steps.target.outputs.server }}"
          REMOTE_PATH="${{ secrets.DEPLOY_PATH }}"

          ssh -F $SSH_CONFIG ${REMOTE_HOST} "mkdir -p ${REMOTE_PATH}/scripts"
          scp -F $SSH_CONFIG deployment/scripts/remote-ops.sh deployment/scripts/health-check-wait.sh ${REMOTE_HOST}:${REMOTE_PATH}/scripts/
          ssh -F $SSH_CONFIG ${REMOTE_HOST} "chmod +x ${REMOTE_PATH}/scripts/*.sh"
          echo "✅ Scripts uploaded to ${REMOTE_HOST}:${REMOTE_PATH}/scripts/"

      - name: Setup remote directories
        run: |
          ssh -F ${{ steps.ssh.outputs.ssh_config }} ${{ steps.target.outputs.server }} \
            "${{ secrets.DEPLOY_PATH }}/scripts/remote-ops.sh setup-dirs"

      - name: Deploy tarball
        run: ./deploy-package.sh ${{ steps.target.outputs.server }} ${{ secrets.JUMP_HOST }}
        env:
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy Docker and Nginx configuration
        run: |
          SSH_CONFIG="${{ steps.ssh.outputs.ssh_config }}"
          REMOTE_HOST="${{ steps.target.outputs.server }}"
          REMOTE_PATH="${{ secrets.DEPLOY_PATH }}"

          # Copy Docker files
          scp -F $SSH_CONFIG deployment/Dockerfile deployment/docker-compose.yml ${REMOTE_HOST}:${REMOTE_PATH}/
          scp -F $SSH_CONFIG deployment/.env.example ${REMOTE_HOST}:${REMOTE_PATH}/

          # Copy Nginx configuration (full modular structure)
          ssh -F $SSH_CONFIG ${REMOTE_HOST} "mkdir -p ${REMOTE_PATH}/nginx/{conf.d,includes,locations,upstreams}"
          scp -F $SSH_CONFIG deployment/nginx/nginx.conf ${REMOTE_HOST}:${REMOTE_PATH}/nginx/
          scp -F $SSH_CONFIG deployment/nginx/conf.d/* ${REMOTE_HOST}:${REMOTE_PATH}/nginx/conf.d/
          scp -F $SSH_CONFIG deployment/nginx/includes/* ${REMOTE_HOST}:${REMOTE_PATH}/nginx/includes/
          scp -F $SSH_CONFIG deployment/nginx/locations/* ${REMOTE_HOST}:${REMOTE_PATH}/nginx/locations/
          scp -F $SSH_CONFIG deployment/nginx/upstreams/blue-upstream.conf deployment/nginx/upstreams/green-upstream.conf ${REMOTE_HOST}:${REMOTE_PATH}/nginx/upstreams/
          # Only seed active-upstream.conf on first deploy (preserve blue/green state)
          ssh -F $SSH_CONFIG ${REMOTE_HOST} "test -f ${REMOTE_PATH}/nginx/upstreams/active-upstream.conf || cp ${REMOTE_PATH}/nginx/upstreams/blue-upstream.conf ${REMOTE_PATH}/nginx/upstreams/active-upstream.conf"

          {{DEPLOY_PGBACKUP_STEP}}

          echo "✅ Docker + Nginx configuration deployed"

      - name: Prepare deployment for Docker build
        run: |
          ssh -F ${{ steps.ssh.outputs.ssh_config }} ${{ steps.target.outputs.server }} \
            "${{ secrets.DEPLOY_PATH }}/scripts/remote-ops.sh receive-deploy"

      - name: Deploy config files from secrets
        run: |
          deployment/scripts/deploy-config-files.sh \
            "${{ inputs.deploy_target }}" \
            "${{ steps.ssh.outputs.ssh_config }}" \
            "${{ steps.target.outputs.server }}" \
            "${{ secrets.DEPLOY_PATH }}"
        env:
          ALL_SECRETS: ${{ toJSON(secrets) }}

      - name: Blue-green deploy
        run: |
          ssh -F ${{ steps.ssh.outputs.ssh_config }} ${{ steps.target.outputs.server }} \
            "${{ secrets.DEPLOY_PATH }}/scripts/remote-ops.sh blue-green-deploy"

      - name: Post-deploy health check
        run: |
          ssh -F ${{ steps.ssh.outputs.ssh_config }} ${{ steps.target.outputs.server }} \
            "${{ secrets.DEPLOY_PATH }}/scripts/remote-ops.sh wait-healthy 120"
