# =============================================================================
# {{PROJECT_NAME}} — Release (Multi-Server)
# =============================================================================
# Coordinated blue-green deployment across multiple servers per environment.
# Three-job structure ensures atomic deploys with barrier pattern:
#   1. build_and_test — build + test the application
#   2. deploy_prepare — upload + prepare ALL servers (build/pull + health check)
#   3. deploy_switch  — switch ALL servers (nginx swap) only if prepare succeeded
#
# The barrier is enforced by GitHub Actions job dependencies:
#   deploy_switch depends on deploy_prepare — if ANY server fails prepare,
#   the switch job never runs, preventing partial deploys.
#
# All deployment logic is handled by deploy-cli.js — YAML is orchestration only.
# The CLI handles multi-server parallelism internally (--max-parallel flag).
# Architecture: CI Runner → SSH → Remote Servers → remote-ops.sh
# =============================================================================

name: Release (Multi-Server)

on:
  workflow_dispatch:
    inputs:
      deploy_target:
        description: 'Deployment target environment'
        required: true
        type: choice
        options:
          - test
          - acceptance
          - production
      deploy_scope:
        description: 'Deploy scope'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - group
          - tag
          - server
      deploy_filter:
        description: 'Filter value (required when scope is not "all")'
        required: false
        type: string
        default: ''
      skip_tests:
        description: 'Skip tests'
        type: boolean
        default: false

# One deploy per environment at a time — never run concurrent deploys
concurrency:
  group: release-${{ inputs.deploy_target }}
  cancel-in-progress: false

jobs:
  # ── Build & Test ─────────────────────────────────────────────
  build_and_test:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Build
        run: yarn clean && yarn build

      - name: Test
        if: ${{ !inputs.skip_tests }}
        run: yarn test

  # ── Upload & Prepare ─────────────────────────────────────────
  # Uploads code and prepares ALL target servers (build/pull + start + health).
  # If ANY server fails preparation, this job fails and switch never runs.
  deploy_prepare:
    name: Upload & Prepare
    runs-on: self-hosted
    timeout-minutes: 30
    needs: [build_and_test]
    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies + build
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile
          yarn clean && yarn build

      # Create the deployment tarball (deployment-X.Y.Z.tgz)
      # Both strategies need this — in-place uses it directly, registry needs
      # the Dockerfile and app source for docker build context
      - name: Create deployment package
        run: ./deploy-package.sh

      # --- Strategy-specific: registry build+push (empty for in-place) ---
{{WORKFLOW_REGISTRY_STEPS}}
      # Upload deployment files to ALL target servers
      - name: Upload to all servers
        run: |
          node deployment/scripts/deploy-cli.js upload \
            --env ${{ inputs.deploy_target }} \
            --scope ${{ inputs.deploy_scope }} \
            --filter "${{ inputs.deploy_filter }}" \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.deploy_target }} \
            --project-name {{PROJECT_NAME_LOWER}} {{UPLOAD_STRATEGY_FLAG}}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}

      # Deploy config files from GitHub secrets to ALL target servers
      - name: Deploy config files to all servers
        run: |
          node deployment/scripts/deploy-cli.js deploy-config \
            --env ${{ inputs.deploy_target }} \
            --scope ${{ inputs.deploy_scope }} \
            --filter "${{ inputs.deploy_filter }}" \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.deploy_target }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}
          ALL_SECRETS: ${{ toJSON(secrets) }}

      # Prepare ALL servers: detect color → build/pull → start → health check
      # Does NOT switch traffic — that's the switch job's responsibility
      - name: Prepare all servers (build + health, no switch)
        run: |
          node deployment/scripts/deploy-cli.js prepare \
            --env ${{ inputs.deploy_target }} \
            --scope ${{ inputs.deploy_scope }} \
            --filter "${{ inputs.deploy_filter }}" \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.deploy_target }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}

  # ── Switch ───────────────────────────────────────────────────
  # Switches ALL servers simultaneously (nginx upstream swap + reload).
  # This job only runs if deploy_prepare succeeded for ALL servers.
  # The switch itself is fast (~seconds) — just nginx config swap + reload.
  deploy_switch:
    name: Switch all servers
    runs-on: self-hosted
    timeout-minutes: 5
    needs: [deploy_prepare]
    steps:
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      # Switch ALL servers: swap nginx upstream → reload → verify → stop old
      - name: Switch all servers (nginx swap only)
        run: |
          node deployment/scripts/deploy-cli.js switch \
            --env ${{ inputs.deploy_target }} \
            --scope ${{ inputs.deploy_scope }} \
            --filter "${{ inputs.deploy_filter }}" \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.deploy_target }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}
