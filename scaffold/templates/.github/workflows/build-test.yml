# =============================================================================
# {{PROJECT_NAME}} — Build & Test
# =============================================================================
# Runs on every push and pull request to all branches.
# Validates that the application builds and all tests pass.
#
# This workflow has no deployment logic — it only builds and tests.
# =============================================================================

name: Build & Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

# Cancel in-progress runs for the same branch (saves runner resources)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_test:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      # Clean workspace — self-hosted runners persist state between runs
      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          npm install -g yarn
          yarn install --frozen-lockfile

      - name: Build
        run: yarn clean && yarn build

      - name: Test
        run: yarn test
