# =============================================================================
# {{PROJECT_NAME}} — Operations (Single Server)
# =============================================================================
# Run operational commands on a single server per environment.
# Triggered manually via workflow_dispatch with operation selection.
#
# All operations are dispatched through deploy-cli.js operate command,
# which SSHs into the target server and runs remote-ops.sh <operation>.
#
# Safety: destructive operations on production are blocked.
# Architecture: CI Runner → SSH → Remote Server → remote-ops.sh <op>
# =============================================================================

name: Operations

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - test
          - acceptance
          - production
      operation:
        description: 'Operation to perform'
        required: true
        type: choice
        options:
          - deploy-config
          - restart-app
          - restart-all
          - health-check
          - view-logs
          - switch-color
          - rollback
          {{OPERATIONS_DATABASE_OPTIONS}}

# One operation per environment at a time
concurrency:
  group: ops-${{ inputs.target }}
  cancel-in-progress: false

jobs:
  operate:
    name: "${{ inputs.operation }} on ${{ inputs.target }}"
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      # Safety guard — block destructive operations on production
      - name: Safety check — block destructive ops on production
        if: inputs.target == 'production' && inputs.operation == 'purge-database'
        run: |
          echo "❌ BLOCKED: purge-database is NEVER allowed on production"
          exit 1

      - name: Clean workspace
        run: find . -mindepth 1 -delete 2>/dev/null || true

      # Sparse checkout — operations only need scripts + config files
      - name: Checkout
        uses: actions/checkout@v4
        with:
          sparse-checkout: |
            deployment/scripts
            deploy-config.json
            deploy-inventory.json
          sparse-checkout-cone-mode: false

      # Single CLI call handles everything: SSH setup, dispatch, cleanup
      - name: Execute operation
        run: |
          node deployment/scripts/deploy-cli.js operate \
            --env ${{ inputs.target }} \
            --deploy-path ${{ secrets.DEPLOY_PATH }}/${{ inputs.target }} \
            --op ${{ inputs.operation }}
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          JUMP_HOST: ${{ secrets.JUMP_HOST }}
          ALL_SECRETS: ${{ toJSON(secrets) }}
