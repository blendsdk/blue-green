name: Test Registry
on: workflow_dispatch

jobs:
  test-registry:
    runs-on: self-hosted
    steps:
      - name: Check registry connectivity
        run: |
          echo "--- Testing registry at localhost:5000 ---"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/v2/)
          echo "GET /v2/ → HTTP $STATUS"
          if [ "$STATUS" = "401" ]; then
            echo "✅ Registry is up (auth required)"
          elif [ "$STATUS" = "200" ]; then
            echo "✅ Registry is up (no auth)"
          else
            echo "❌ Registry unreachable (HTTP $STATUS)"
            exit 1
          fi

      - name: Authenticate with registry
        run: |
          echo "--- Docker login ---"
          echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login localhost:5000 -u "${{ secrets.REGISTRY_USER }}" --password-stdin
          echo "✅ Login succeeded"

      - name: Push test image
        run: |
          echo "--- Pulling alpine:latest ---"
          docker pull alpine:latest

          TAG="ci-test-${{ github.run_id }}"
          echo "--- Tagging as localhost:5000/registry-test:${TAG} ---"
          docker tag alpine:latest "localhost:5000/registry-test:${TAG}"

          echo "--- Pushing to registry ---"
          docker push "localhost:5000/registry-test:${TAG}"
          echo "✅ Push succeeded"

      - name: Verify image in registry
        run: |
          TAG="ci-test-${{ github.run_id }}"
          echo "--- Listing tags for registry-test ---"
          curl -sf -u "${{ secrets.REGISTRY_USER }}:${{ secrets.REGISTRY_PASSWORD }}" \
            "http://localhost:5000/v2/registry-test/tags/list" | jq .
          echo "✅ Image found in registry"

      - name: Pull test image back
        run: |
          TAG="ci-test-${{ github.run_id }}"
          echo "--- Removing local image ---"
          docker rmi "localhost:5000/registry-test:${TAG}"

          echo "--- Pulling from registry ---"
          docker pull "localhost:5000/registry-test:${TAG}"
          echo "✅ Pull succeeded — round-trip complete!"

      - name: Cleanup
        if: always()
        run: |
          TAG="ci-test-${{ github.run_id }}"
          docker rmi "localhost:5000/registry-test:${TAG}" 2>/dev/null || true
          docker rmi alpine:latest 2>/dev/null || true
          docker logout localhost:5000 2>/dev/null || true
          echo "✅ Cleanup done"
